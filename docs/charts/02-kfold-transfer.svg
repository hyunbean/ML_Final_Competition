<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 430" width="880" height="430" role="img" aria-label="pseudo-label student의 K-fold 수에 따른 Public 점수. K=5에서 0.73540, K=10에서 0.73671로 +0.0013 상승 후 K=50까지 0.73690으로 포화. 같은 변화의 Private 전이는 +0.0001에 그쳤다.">
  
  <style>
    .r{--surface:#fcfcfb;--ink:#0b0b0b;--ink2:#52514e;--muted:#898781;
       --grid:#e1e0d9;--axis:#c3c2b7;--s1:#2a78d6;--s2:#008300;
       --ref:#b98a1f;--warn:#d03b3b;--band:#f0efec;
       --seq-lo:#86b6ef;--seq-hi:#1c5cab;}
    @media (prefers-color-scheme: dark){
      .r{--surface:#1a1a19;--ink:#ffffff;--ink2:#c3c2b7;--muted:#898781;
         --grid:#2c2c2a;--axis:#383835;--s1:#3987e5;--s2:#008300;
         --ref:#fab219;--warn:#e66767;--band:#262624;
         --seq-lo:#5598e7;--seq-hi:#86b6ef;}
    }
    .bg{fill:var(--surface)}
    .ttl{fill:var(--ink);font:700 19px system-ui,-apple-system,"Segoe UI","Malgun Gothic","Apple SD Gothic Neo",sans-serif}
    .sub{fill:var(--ink2);font:400 13.5px system-ui,-apple-system,"Segoe UI","Malgun Gothic","Apple SD Gothic Neo",sans-serif}
    .tick{fill:var(--muted);font:400 11px system-ui,-apple-system,"Segoe UI","Malgun Gothic","Apple SD Gothic Neo",sans-serif;font-variant-numeric:tabular-nums}
    .lab{fill:var(--ink);font:700 13px system-ui,-apple-system,"Segoe UI","Malgun Gothic","Apple SD Gothic Neo",sans-serif}
    .note{fill:var(--ink2);font:400 12px system-ui,-apple-system,"Segoe UI","Malgun Gothic","Apple SD Gothic Neo",sans-serif}
    .small{fill:var(--muted);font:400 11px system-ui,-apple-system,"Segoe UI","Malgun Gothic","Apple SD Gothic Neo",sans-serif}
    .grid{stroke:var(--grid);stroke-width:1}
    .axis{stroke:var(--axis);stroke-width:1}
    .ln{fill:none;stroke-width:2;stroke-linejoin:round;stroke-linecap:round}
    .dot{stroke:var(--surface);stroke-width:2}
  </style>
  <g class="r">
    <rect class="bg" x="0" y="0" width="880" height="430"/>
    <text class="ttl" x="76" y="34">천장은 데이터가 아니라 fold-5 의 분산이었다 — 그러나</text>
    <text class="sub" x="76" y="57">며칠간 &quot;데이터 천장&quot;으로 단정했던 0.7354는 fold 를 늘리자 뚫렸다. 하지만 그 상승은 Private 으로 거의 전이되지 않았다.</text>
    <rect x="142.0" y="96" width="528.0" height="270" fill="var(--band)" opacity="0.75"/><text class="small" x="406.0" y="114" text-anchor="middle">포화 구간 — 이후 40배 늘려도 +0.0002 (노이즈 수준)</text><line class="grid" x1="76" y1="341.5" x2="670" y2="341.5"/><text class="tick" x="68" y="345.0" text-anchor="end">0.7352</text><line class="grid" x1="76" y1="292.4" x2="670" y2="292.4"/><text class="tick" x="68" y="295.9" text-anchor="end">0.7356</text><line class="grid" x1="76" y1="243.3" x2="670" y2="243.3"/><text class="tick" x="68" y="246.8" text-anchor="end">0.7360</text><line class="grid" x1="76" y1="194.2" x2="670" y2="194.2"/><text class="tick" x="68" y="197.7" text-anchor="end">0.7364</text><line class="grid" x1="76" y1="145.1" x2="670" y2="145.1"/><text class="tick" x="68" y="148.6" text-anchor="end">0.7368</text><line class="axis" x1="76" y1="366" x2="670" y2="366"/><polyline class="ln" points="76.0,316.9 142.0,156.1 340.0,148.8 406.0,143.9 538.0,142.6 670.0,132.8" stroke="var(--s1)"/><circle class="dot" cx="76.0" cy="316.9" r="4.5" fill="var(--s1)"/><text class="tick" x="76.0" y="386" text-anchor="middle">5</text><circle class="dot" cx="142.0" cy="156.1" r="4.5" fill="var(--s1)"/><text class="tick" x="142.0" y="386" text-anchor="middle">10</text><circle class="dot" cx="340.0" cy="148.8" r="4.5" fill="var(--s1)"/><text class="tick" x="340.0" y="386" text-anchor="middle">25</text><circle class="dot" cx="406.0" cy="143.9" r="4.5" fill="var(--s1)"/><text class="tick" x="406.0" y="386" text-anchor="middle">30</text><circle class="dot" cx="538.0" cy="142.6" r="4.5" fill="var(--s1)"/><text class="tick" x="538.0" y="386" text-anchor="middle">40</text><circle class="dot" cx="670.0" cy="132.8" r="4.5" fill="var(--s1)"/><text class="tick" x="670.0" y="386" text-anchor="middle">50</text><text class="small" x="373.0" y="406" text-anchor="middle">pseudo-label student 의 K-fold 수</text><path d="M 85.0 312.9 C 110.0 286.9, 112.0 130.1, 135.0 147.1" fill="none" stroke="var(--ink2)" stroke-width="1.2" stroke-dasharray="3 3"/><text class="lab" x="109.0" y="122.1" text-anchor="middle">+0.0013</text><text class="small" x="109.0" y="136.1" text-anchor="middle">"천장 돌파" (팀 5위→1위)</text><g transform="translate(686,136)">
    <rect x="0" y="0" width="178" height="122" rx="9" fill="none" stroke="var(--warn)" stroke-width="1.5"/>
    <text class="lab" x="13" y="26" fill="var(--warn)">그런데 Private은?</text>
    <text class="note" x="13" y="50">Public  +0.0013</text>
    <text class="note" x="13" y="70">Private +0.0001</text>
    <line class="grid" x1="13" y1="82" x2="165" y2="82"/>
    <text class="small" x="13" y="100">fold↑는 &quot;public의&quot;</text>
    <text class="small" x="13" y="114">분산만 줄였다</text>
  </g>
  </g>
</svg>