<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" width="880" height="480" role="img" aria-label="제출별 Public/Private 점수 궤적. Public은 0.7354에서 0.7385로 올랐지만 Private은 0.7316에서 0.7324로 거의 평탄했고, 1등팀 private 0.7345에 미치지 못했다.">
  
  <style>
    .r{--surface:#fcfcfb;--ink:#0b0b0b;--ink2:#52514e;--muted:#898781;
       --grid:#e1e0d9;--axis:#c3c2b7;--s1:#2a78d6;--s2:#008300;
       --ref:#b98a1f;--warn:#d03b3b;--band:#f0efec;
       --seq-lo:#86b6ef;--seq-hi:#1c5cab;}
    @media (prefers-color-scheme: dark){
      .r{--surface:#1a1a19;--ink:#ffffff;--ink2:#c3c2b7;--muted:#898781;
         --grid:#2c2c2a;--axis:#383835;--s1:#3987e5;--s2:#008300;
         --ref:#fab219;--warn:#e66767;--band:#262624;
         --seq-lo:#5598e7;--seq-hi:#86b6ef;}
    }
    .bg{fill:var(--surface)}
    .ttl{fill:var(--ink);font:700 19px system-ui,-apple-system,"Segoe UI","Malgun Gothic","Apple SD Gothic Neo",sans-serif}
    .sub{fill:var(--ink2);font:400 13.5px system-ui,-apple-system,"Segoe UI","Malgun Gothic","Apple SD Gothic Neo",sans-serif}
    .tick{fill:var(--muted);font:400 11px system-ui,-apple-system,"Segoe UI","Malgun Gothic","Apple SD Gothic Neo",sans-serif;font-variant-numeric:tabular-nums}
    .lab{fill:var(--ink);font:700 13px system-ui,-apple-system,"Segoe UI","Malgun Gothic","Apple SD Gothic Neo",sans-serif}
    .note{fill:var(--ink2);font:400 12px system-ui,-apple-system,"Segoe UI","Malgun Gothic","Apple SD Gothic Neo",sans-serif}
    .small{fill:var(--muted);font:400 11px system-ui,-apple-system,"Segoe UI","Malgun Gothic","Apple SD Gothic Neo",sans-serif}
    .grid{stroke:var(--grid);stroke-width:1}
    .axis{stroke:var(--axis);stroke-width:1}
    .ln{fill:none;stroke-width:2;stroke-linejoin:round;stroke-linecap:round}
    .dot{stroke:var(--surface);stroke-width:2}
  </style>
  <g class="r">
    <rect class="bg" x="0" y="0" width="880" height="480"/>
    <text class="ttl" x="72" y="34">Public은 올랐지만 Private은 멈춰 있었다</text>
    <text class="sub" x="72" y="57">같은 6번의 제출에서 Public +0.0031 · Private +0.0008 — 상승분의 대부분이 거품이었다</text>
    <line class="grid" x1="72" y1="382.9" x2="722" y2="382.9"/><text class="tick" x="64" y="386.4" text-anchor="end">0.7320</text><line class="grid" x1="72" y1="312.6" x2="722" y2="312.6"/><text class="tick" x="64" y="316.1" text-anchor="end">0.7340</text><line class="grid" x1="72" y1="242.4" x2="722" y2="242.4"/><text class="tick" x="64" y="245.9" text-anchor="end">0.7360</text><line class="grid" x1="72" y1="172.1" x2="722" y2="172.1"/><text class="tick" x="64" y="175.6" text-anchor="end">0.7380</text><line class="axis" x1="72" y1="418" x2="722" y2="418"/><line x1="72" y1="295.1" x2="722" y2="295.1" stroke="var(--ref)" stroke-width="1.5" stroke-dasharray="6 4"/><text class="small" x="730" y="292.1" fill="var(--ref)" font-weight="700">1등팀 private</text><text class="small" x="730" y="306.1" fill="var(--ref)">0.7345 — 넘지 못한 선</text><line x1="202" y1="112" x2="202" y2="418" stroke="var(--warn)" stroke-width="1.2" stroke-dasharray="4 3" opacity="0.75"/><text class="small" x="202" y="106" fill="var(--warn)" font-weight="700" text-anchor="middle">fold 5→10 · 거품의 시작</text><polyline class="ln" points="72.0,263.5 202.0,217.8 332.0,210.8 462.0,235.4 592.0,161.6 722.0,154.6" stroke="var(--s1)"/><polyline class="ln" points="72.0,396.9 202.0,393.4 332.0,396.9 462.0,393.4 592.0,375.9 722.0,368.8" stroke="var(--s2)"/><circle class="dot" cx="72.0" cy="263.5" r="4.5" fill="var(--s1)"/><circle class="dot" cx="202.0" cy="217.8" r="4.5" fill="var(--s1)"/><circle class="dot" cx="332.0" cy="210.8" r="4.5" fill="var(--s1)"/><circle class="dot" cx="462.0" cy="235.4" r="4.5" fill="var(--s1)"/><circle class="dot" cx="592.0" cy="161.6" r="4.5" fill="var(--s1)"/><circle class="dot" cx="722.0" cy="154.6" r="4.5" fill="var(--s1)"/><circle class="dot" cx="72.0" cy="396.9" r="4.5" fill="var(--s2)"/><circle class="dot" cx="202.0" cy="393.4" r="4.5" fill="var(--s2)"/><circle class="dot" cx="332.0" cy="396.9" r="4.5" fill="var(--s2)"/><circle class="dot" cx="462.0" cy="393.4" r="4.5" fill="var(--s2)"/><circle class="dot" cx="592.0" cy="375.9" r="4.5" fill="var(--s2)"/><circle class="dot" cx="722.0" cy="368.8" r="4.5" fill="var(--s2)"/><text class="lab" x="730" y="158.6" fill="var(--s1)">Public</text><text class="small" x="730" y="172.6" fill="var(--s1)">+0.0031</text><text class="lab" x="730" y="372.8" fill="var(--s2)">Private</text><text class="small" x="730" y="386.8" fill="var(--s2)">+0.0008</text><text class="tick" x="72.0" y="438" text-anchor="middle">#92</text><text class="tick" x="202.0" y="438" text-anchor="middle">#112</text><text class="tick" x="332.0" y="438" text-anchor="middle">#120</text><text class="tick" x="462.0" y="438" text-anchor="middle">#123</text><text class="tick" x="592.0" y="438" text-anchor="middle">#126</text><text class="tick" x="722.0" y="438" text-anchor="middle">#140</text><text class="small" x="397.0" y="458" text-anchor="middle">제출 번호 (시간순)</text><g transform="translate(72,76)">
    <rect x="0" y="0" width="11" height="11" rx="2" fill="var(--s1)"/><text class="note" x="17" y="10">Public LB</text>
    <rect x="94" y="0" width="11" height="11" rx="2" fill="var(--s2)"/><text class="note" x="111" y="10">Private LB</text>
  </g>
  </g>
</svg>