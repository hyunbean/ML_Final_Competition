<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" width="880" height="400" role="img" aria-label="상위 4팀의 Public 대비 Private 점수. 우리 팀은 Public 최고 0.7385였으나 Private 0.7324로 가장 크게 떨어졌고 갭-Public 상관이 +0.63으로 가장 높았다. 3등팀은 Private이 오히려 상승했다.">
  
  <style>
    .r{--surface:#fcfcfb;--ink:#0b0b0b;--ink2:#52514e;--muted:#898781;
       --grid:#e1e0d9;--axis:#c3c2b7;--s1:#2a78d6;--s2:#008300;
       --ref:#b98a1f;--warn:#d03b3b;--band:#f0efec;
       --seq-lo:#86b6ef;--seq-hi:#1c5cab;}
    @media (prefers-color-scheme: dark){
      .r{--surface:#1a1a19;--ink:#ffffff;--ink2:#c3c2b7;--muted:#898781;
         --grid:#2c2c2a;--axis:#383835;--s1:#3987e5;--s2:#008300;
         --ref:#fab219;--warn:#e66767;--band:#262624;
         --seq-lo:#5598e7;--seq-hi:#86b6ef;}
    }
    .bg{fill:var(--surface)}
    .ttl{fill:var(--ink);font:700 19px system-ui,-apple-system,"Segoe UI","Malgun Gothic","Apple SD Gothic Neo",sans-serif}
    .sub{fill:var(--ink2);font:400 13.5px system-ui,-apple-system,"Segoe UI","Malgun Gothic","Apple SD Gothic Neo",sans-serif}
    .tick{fill:var(--muted);font:400 11px system-ui,-apple-system,"Segoe UI","Malgun Gothic","Apple SD Gothic Neo",sans-serif;font-variant-numeric:tabular-nums}
    .lab{fill:var(--ink);font:700 13px system-ui,-apple-system,"Segoe UI","Malgun Gothic","Apple SD Gothic Neo",sans-serif}
    .note{fill:var(--ink2);font:400 12px system-ui,-apple-system,"Segoe UI","Malgun Gothic","Apple SD Gothic Neo",sans-serif}
    .small{fill:var(--muted);font:400 11px system-ui,-apple-system,"Segoe UI","Malgun Gothic","Apple SD Gothic Neo",sans-serif}
    .grid{stroke:var(--grid);stroke-width:1}
    .axis{stroke:var(--axis);stroke-width:1}
    .ln{fill:none;stroke-width:2;stroke-linejoin:round;stroke-linecap:round}
    .dot{stroke:var(--surface);stroke-width:2}
  </style>
  <g class="r">
    <rect class="bg" x="0" y="0" width="880" height="400"/>
    <text class="ttl" x="10" y="34">Public 1위가 Private 2위가 된 이유</text>
    <text class="sub" x="10" y="57">우리는 Public 최고점을 찍고도 낙폭이 가장 컸다. 3등팀은 Public 7위권 점수로 Private 3위에 올랐다.</text>
    <line class="grid" x1="180.7" y1="116" x2="180.7" y2="342"/><text class="tick" x="180.7" y="361" text-anchor="middle">0.730</text><line class="grid" x1="286.2" y1="116" x2="286.2" y2="342"/><text class="tick" x="286.2" y="361" text-anchor="middle">0.732</text><line class="grid" x1="391.7" y1="116" x2="391.7" y2="342"/><text class="tick" x="391.7" y="361" text-anchor="middle">0.734</text><line class="grid" x1="497.2" y1="116" x2="497.2" y2="342"/><text class="tick" x="497.2" y="361" text-anchor="middle">0.736</text><line class="grid" x1="602.7" y1="116" x2="602.7" y2="342"/><text class="tick" x="602.7" y="361" text-anchor="middle">0.738</text><line class="axis" x1="128" y1="342" x2="666" y2="342"/><text class="note" x="114" y="146.0" text-anchor="end">1등팀</text><line x1="420.3" y1="142.0" x2="595.8" y2="142.0" stroke="var(--axis)" stroke-width="3" stroke-linecap="round"/><circle class="dot" cx="595.8" cy="142.0" r="6" fill="var(--seq-lo)"/><circle class="dot" cx="420.3" cy="142.0" r="6" fill="var(--seq-hi)"/><text class="note" x="700" y="146.0" text-anchor="end" fill="var(--ink2)">r = −0.19</text><text class="small" x="712" y="146.0" fill="var(--muted)">robust</text><rect x="10" y="179.7" width="858.0" height="38" rx="7" fill="var(--band)" opacity="0.7"/><text class="lab" x="114" y="202.7" text-anchor="end">2등팀 (우리)</text><line x1="308.7" y1="198.7" x2="629.8" y2="198.7" stroke="var(--axis)" stroke-width="3" stroke-linecap="round"/><circle class="dot" cx="629.8" cy="198.7" r="6" fill="var(--seq-lo)"/><circle class="dot" cx="308.7" cy="198.7" r="6" fill="var(--seq-hi)"/><text class="lab" x="700" y="202.7" text-anchor="end" fill="var(--warn)">r = +0.63</text><text class="small" x="712" y="202.7" fill="var(--warn)">과적합</text><text class="note" x="114" y="259.3" text-anchor="end">3등팀</text><line x1="281.3" y1="255.3" x2="303.3" y2="255.3" stroke="var(--axis)" stroke-width="3" stroke-linecap="round"/><circle class="dot" cx="281.3" cy="255.3" r="6" fill="var(--seq-lo)"/><circle class="dot" cx="303.3" cy="255.3" r="6" fill="var(--seq-hi)"/><text class="note" x="700" y="259.3" text-anchor="end" fill="var(--ink2)">r = −0.36</text><text class="small" x="712" y="259.3" fill="var(--muted)">robust</text><text class="note" x="114" y="316.0" text-anchor="end">4등팀</text><line x1="164.1" y1="312.0" x2="549.4" y2="312.0" stroke="var(--axis)" stroke-width="3" stroke-linecap="round"/><circle class="dot" cx="549.4" cy="312.0" r="6" fill="var(--seq-lo)"/><circle class="dot" cx="164.1" cy="312.0" r="6" fill="var(--seq-hi)"/><text class="note" x="700" y="316.0" text-anchor="end" fill="var(--warn)">r = +0.44</text><text class="small" x="712" y="316.0" fill="var(--warn)">과적합</text><g transform="translate(10,86)">
    <circle cx="6" cy="6" r="6" fill="var(--seq-lo)" stroke="var(--surface)" stroke-width="2"/><text class="note" x="19" y="10">Public LB</text>
    <circle cx="104" cy="6" r="6" fill="var(--seq-hi)" stroke="var(--surface)" stroke-width="2"/><text class="note" x="117" y="10">Private LB</text>
    <text class="small" x="702" y="10" text-anchor="end">막대 길이 = 거품 · r = 갭–Public 상관 (양수일수록 과적합)</text>
  </g>
  </g>
</svg>